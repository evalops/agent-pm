name: Bazel RBE

on:
  pull_request:
    paths:
      - .bazelignore
      - .bazelrc
      - .bazelversion
      - .github/actionlint.yaml
      - .github/workflows/bazel-rbe.yml
      - BUILD.bazel
      - MODULE.bazel
      - MODULE.bazel.lock
      - Makefile
      - bazel/**
      - requirements_lock.txt
      - scripts/run-bazel-rbe.sh
      - "agent_pm/**/*.py"
      - "tests/**/*.py"
      - app.py
      - pyproject.toml
      - uv.lock
  push:
    branches:
      - main
    paths:
      - .bazelignore
      - .bazelrc
      - .bazelversion
      - .github/actionlint.yaml
      - .github/workflows/bazel-rbe.yml
      - BUILD.bazel
      - MODULE.bazel
      - MODULE.bazel.lock
      - Makefile
      - bazel/**
      - requirements_lock.txt
      - scripts/run-bazel-rbe.sh
      - "agent_pm/**/*.py"
      - "tests/**/*.py"
      - app.py
      - pyproject.toml
      - uv.lock
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || vars.BAZEL_RBE_ENABLED == 'true'
    runs-on:
      - self-hosted
      - Linux
      - X64
      - evalops-agent-pm-rbe
    timeout-minutes: 25
    env:
      BAZEL_RBE_USE_EXISTING_TUNNEL: "true"
      DRY_RUN: "true"
      OPENAI_API_KEY: test-key
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@c7f87aa956e4c323abf06d5dec078e358f6b4d04 # v7.2.1
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache: false

      - name: Install Bazel tools
        env:
          GOBIN: ${{ runner.temp }}/bazel-tools
        run: |
          mkdir -p "${GOBIN}"
          echo "${GOBIN}" >> "${GITHUB_PATH}"
          go install github.com/bazelbuild/bazelisk@latest
          go install github.com/bazelbuild/buildtools/buildifier@latest

      - name: Verify generated Bazel graph
        run: make bazel-check

      - name: Run Buildfarm smoke tests
        run: make bazel-rbe-smoke
